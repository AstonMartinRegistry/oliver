<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" shape-rendering="crispEdges">
  <rect width="56" height="56" fill="none"/>
  <g>
    <!-- 14x18 pixel parrot, 4px per cell, matches the extension bird -->
    <!-- row0 -->
    <rect x="20" y="0" width="12" height="4" fill="#3fa540"/>
    <!-- row1 -->
    <rect x="16" y="4" width="20" height="4" fill="#3fa540"/>
    <!-- row2 -->
    <rect x="12" y="8" width="28" height="4" fill="#3fa540"/>
    <!-- row3 -->
    <rect x="12" y="12" width="32" height="4" fill="#3fa540"/>
    <!-- row4 -->
    <rect x="8" y="16" width="40" height="4" fill="#3fa540"/>
    <!-- row5 eye -->
    <rect x="8" y="20" width="32" height="4" fill="#3fa540"/>
    <rect x="40" y="20" width="4" height="4" fill="#101010"/>
    <rect x="44" y="20" width="4" height="4" fill="#3fa540"/>
    <!-- row6 beak -->
    <rect x="8" y="24" width="40" height="4" fill="#3fa540"/>
    <rect x="48" y="24" width="8" height="4" fill="#ef7d1a"/>
    <!-- row7 beak -->
    <rect x="4" y="28" width="44" height="4" fill="#3fa540"/>
    <rect x="48" y="28" width="8" height="4" fill="#ef7d1a"/>
    <!-- row8 -->
    <rect x="4" y="32" width="48" height="4" fill="#3fa540"/>
    <!-- row9 wing red -->
    <rect x="4" y="36" width="24" height="4" fill="#3fa540"/>
    <rect x="28" y="36" width="12" height="4" fill="#d62828"/>
    <rect x="40" y="36" width="8" height="4" fill="#3fa540"/>
    <!-- row10 -->
    <rect x="4" y="40" width="20" height="4" fill="#3fa540"/>
    <rect x="24" y="40" width="16" height="4" fill="#d62828"/>
    <rect x="40" y="40" width="8" height="4" fill="#3fa540"/>
    <!-- row11 blue + red -->
    <rect x="4" y="44" width="16" height="4" fill="#3fa540"/>
    <rect x="20" y="44" width="8" height="4" fill="#2b53c8"/>
    <rect x="28" y="44" width="12" height="4" fill="#d62828"/>
    <rect x="40" y="44" width="4" height="4" fill="#3fa540"/>
    <!-- row12 -->
    <rect x="8" y="48" width="16" height="4" fill="#3fa540"/>
    <rect x="24" y="48" width="4" height="4" fill="#2b53c8"/>
    <rect x="28" y="48" width="12" height="4" fill="#d62828"/>
    <!-- row13 tail -->
    <rect x="8" y="52" width="8" height="4" fill="#d62828"/>
    <rect x="16" y="52" width="16" height="4" fill="#3fa540"/>
    <rect x="32" y="52" width="8" height="4" fill="#d62828"/>
  </g>
</svg>
